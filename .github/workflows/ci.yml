name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: promforge-app/package.json
      - name: Install
        working-directory: promforge-app
        run: npm install --no-audit --no-fund
      - name: Lint
        working-directory: promforge-app
        run: npm run lint --if-present
      - name: Static checks (server boots)
        working-directory: promforge-app
        env:
          NODE_ENV: test
          DATABASE_URL: postgres://stub:stub@localhost:5432/stub
          JWT_SECRET: ci-test-secret
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_ANON_KEY: stub
        run: |
          node -e "import('./server/config.mjs').then(m => console.log('config ok', m.config.env))"
      - name: Smoke import server module graph
        working-directory: promforge-app
        env:
          NODE_ENV: test
          DATABASE_URL: postgres://stub:stub@localhost:5432/stub
          JWT_SECRET: ci-test-secret
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_ANON_KEY: stub
        run: |
          node --input-type=module -e "import('./server/index.mjs').then(()=>console.log('graph ok')).catch(e=>{console.error(e);process.exit(1)})"
