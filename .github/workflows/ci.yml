name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Lint
        run: npm run lint --if-present
      - name: Tests (auth helpers)
        env:
          NODE_ENV: test
          DATABASE_URL: postgres://stub:stub@localhost:5432/stub
          JWT_SECRET: ci-test-secret
        run: npm test
      - name: Static config check
        env:
          NODE_ENV: test
          DATABASE_URL: postgres://stub:stub@localhost:5432/stub
          JWT_SECRET: ci-test-secret
        run: |
          node -e "import('./server/config.mjs').then(m => console.log('config ok', m.config.env))"
