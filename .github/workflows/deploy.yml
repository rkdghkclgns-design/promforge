name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm install --omit=dev --no-audit --no-fund
      - name: Bootstrap admin user
        if: ${{ env.DATABASE_URL != '' }}
        run: node scripts/bootstrap-admin.mjs

      # Replace with your hosting provider's deploy step.
      # Examples (uncomment and add corresponding secrets):
      #
      #   • Render:  curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
      #   • Fly.io:  flyctl deploy --remote-only  (FLY_API_TOKEN secret)
      #   • Railway: railway up                    (RAILWAY_TOKEN secret)
      #   • Vercel:  vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy placeholder
        run: echo "Configure your deploy provider here. See README for required secrets."
