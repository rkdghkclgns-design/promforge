name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm install --omit=dev --no-audit --no-fund
      - name: Bootstrap admin user
        if: ${{ env.DATABASE_URL != '' }}
        run: node scripts/bootstrap-admin.mjs
      # Render Free tier auto-deploys from GitHub when the service is created
      # from render.yaml. The deploy hook is optional — only fires if you set the
      # RENDER_DEPLOY_HOOK secret to force a redeploy bypassing autoDeploy.
      - name: Trigger Render deploy hook
        if: ${{ env.RENDER_DEPLOY_HOOK != '' }}
        run: curl -fsSL -X POST "$RENDER_DEPLOY_HOOK" || echo "deploy hook returned non-zero (non-fatal)"
      - name: Deploy summary
        run: |
          echo "::notice::Render Free tier hosts the live app via render.yaml blueprint."
          echo "::notice::Configure on Render once: import this repo as a Blueprint, fill in DATABASE_URL / SUPABASE_ANON_KEY / ADMIN_PASSWORD."
