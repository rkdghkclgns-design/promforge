name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        working-directory: promforge-app
        run: npm install --omit=dev --no-audit --no-fund
      - name: Bootstrap admin user
        if: ${{ env.DATABASE_URL != '' }}
        working-directory: promforge-app
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: node scripts/bootstrap-admin.mjs

      # Replace this with your hosting provider's deploy step.
      # Examples (commented out):
      #
      # - name: Deploy to Render
      #   run: curl -X POST "$RENDER_DEPLOY_HOOK"
      #
      # - name: Deploy to Fly.io
      #   uses: superfly/flyctl-actions/setup-flyctl@master
      # - run: flyctl deploy --remote-only
      #   env:
      #     FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Deploy placeholder
        run: echo "Configure your deploy provider here. Secrets to wire up are listed in the README."
